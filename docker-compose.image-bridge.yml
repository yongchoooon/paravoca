services:
  image-bridge:
    build:
      context: ./image-bridge
    environment:
      OPENAI_API_KEY: ${IMAGE_BRIDGE_OPENAI_API_KEY:-}
      IMAGE_BRIDGE_TOKEN: ${IMAGE_BRIDGE_TOKEN:-}
      IMAGE_BRIDGE_MODEL: ${IMAGE_BRIDGE_MODEL:-gpt-image-2}
      IMAGE_BRIDGE_DEFAULT_SIZE: ${IMAGE_BRIDGE_DEFAULT_SIZE:-1024x1536}
      IMAGE_BRIDGE_DEFAULT_QUALITY: ${IMAGE_BRIDGE_DEFAULT_QUALITY:-low}
      IMAGE_BRIDGE_PUBLIC_BASE_URL: ${IMAGE_BRIDGE_PUBLIC_BASE_URL:-}
      IMAGE_BRIDGE_STORAGE_DIR: ${IMAGE_BRIDGE_STORAGE_DIR:-data/images}
    ports:
      - "8080:8080"
    volumes:
      - ./image-bridge/data:/app/data

  cloudflared:
    image: cloudflare/cloudflared:latest
    profiles:
      - tunnel
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN:-}
    depends_on:
      - image-bridge
